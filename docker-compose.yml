# Local Postgres for Windows dev — run inside WSL2 (Docker Desktop).
#   wsl
#   cd /mnt/d/repos/SocialMediaLite   # or your clone path
#   docker compose up -d
# Windows Node uses DATABASE_URL=...@localhost:5432... from repo-root `.env`.
services:
  my-postgres:
    image: postgres:16
    container_name: my-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socialmedialite
    volumes:
      - socialmedialite_pgdata:/var/lib/postgresql/data

volumes:
  socialmedialite_pgdata:
