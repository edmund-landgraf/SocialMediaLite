# Local nginx example (WSL / Linux dev) — HTTP only, no Let's Encrypt certs.
#
# Dev on Windows normally uses `npm run dev` (Vite + API) and does not need nginx.
# Use this only if you want nginx in front of a local build, e.g.:
#
#   npm run build -w apps/web
#   sudo cp deploy/nginx/unwhelm.online.local.conf /etc/nginx/sites-available/unwhelm.local
#   sudo ln -sf /etc/nginx/sites-available/unwhelm.local /etc/nginx/sites-enabled/
#   # Edit `root` below to your dist path, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL lines are commented — do not enable without real cert paths.

server {
    listen 80;
    listen [::]:80;
    server_name localhost unwhelm.local;

    root /var/www/unwhelm.local;
    index index.html;

    client_max_body_size 25m;

    location /assets/ {
        try_files $uri @sml_api_assets;
    }

    location @sml_api_assets {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /syndicate/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Optional local HTTPS (self-signed) — keep ssl_certificate lines commented unless configured:
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name localhost unwhelm.local;
#
#     # ssl_certificate     /path/to/fullchain.pem;
#     # ssl_certificate_key /path/to/privkey.pem;
#
#     ...
# }
