# Production nginx site for unwhelm.online (Linux VPS).
#
# SSL certificate lines are ACTIVE here (Let's Encrypt paths). For local HTTP-only
# testing, use deploy/nginx/unwhelm.online.local.conf instead (SSL commented).
#
# WARNING: Do NOT blind-copy this file onto a live VPS on every deploy — it can
# overwrite Certbot edits. Routine deploys use:
#   ./scripts/ensure-nginx-ssl.sh   — uncomment ssl_certificate if needed
#   ./scripts/sync-nginx-syndicate.sh — patch location /syndicate/ only
#
# Fresh install only:
#   sudo cp deploy/nginx/unwhelm.online.conf /etc/nginx/sites-available/unwhelm.online
#   sudo ln -sf /etc/nginx/sites-available/unwhelm.online /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Static UI: /var/www/unwhelm.online  (populated by scripts/deploy-prod.sh)
# API:       PM2 sml-api on 127.0.0.1:3001

server {
    listen 80;
    listen [::]:80;
    server_name unwhelm.online www.unwhelm.online;

    # Redirect HTTP -> HTTPS (adjust cert paths for your setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name unwhelm.online www.unwhelm.online;

    ssl_certificate     /etc/letsencrypt/live/unwhelm.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unwhelm.online/privkey.pem;

    root /var/www/unwhelm.online;
    index index.html;

    client_max_body_size 25m;

    # Uploaded images live at /assets/users/... on the API (apps/api/storage).
    # Vite build chunks live at /assets/index-*.js in this same directory — try disk first.
    location /assets/ {
        try_files $uri @sml_api_assets;
    }

    location @sml_api_assets {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /syndicate/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
